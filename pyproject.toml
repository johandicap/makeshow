#
# isort configuration
#   https://pycqa.github.io/isort/docs/configuration/options.html
#
[tool.isort]
py_version = 38
line_length = 120
lines_after_imports = 2
multi_line_output = 9
# See possible "multi_line_output" values at https://pycqa.github.io/isort/docs/configuration/multi_line_output_modes.html
ensure_newline_before_comments = true
# Specify known_first_party if isort confuses first party modules for being something else
known_first_party = ""
known_local_folder = ""

#
# black configuration
#  https://black.readthedocs.io/en/stable/usage_and_configuration/the_basics.html#configuration-format
#
[tool.black]
line-length = 120
target-version = ['py38']
include = '\.pyi?$'
extend-exclude = ''


#
# ruff configuration
#   https://docs.astral.sh/ruff/configuration/#using-pyprojecttoml
#
[tool.ruff]
# General settings
line-length = 120
indent-width = 4
target-version = "py38"

# Exclude a variety of commonly ignored directories.
# Note: Ruff now excludes many of these by default, 
# but keeping them here ensures explicit behavior.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]


[tool.ruff.lint]
# Enable the pycodestyle (`E`), Pyflakes (`F`), warnings (`W`), and flake8-bugbear (`B`)
select = ["E", "F", "W", "B"]
ignore = []

# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

# File-specific overrides
per-file-ignores = {}


[tool.ruff.format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"

# Enable auto-formatting of code examples in docstrings. Markdown,
# reStructuredText code/literal blocks and doctests are all supported.
#
# This is currently disabled by default, but it is planned for this
# to be opt-out in the future.
docstring-code-format = false

# Set the line length limit used when formatting code snippets in
# docstrings.
#
# This only has an effect when the `docstring-code-format` setting is
# enabled.
docstring-code-line-length = "dynamic"
